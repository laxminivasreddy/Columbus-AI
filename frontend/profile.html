<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AI Travel Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-indigo-900 min-h-screen flex items-center justify-center font-inter relative overflow-hidden">

    <!-- Decorative Animated Background -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-accent rounded-full mix-blend-screen filter blur-[100px] opacity-30 animate-pulse"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-purple-500 rounded-full mix-blend-screen filter blur-[100px] opacity-30"></div>
    </div>

    <!-- Main Profile Card -->
    <div class="bg-white/10 backdrop-blur-2xl border border-white/20 shadow-[0_8px_32px_0_rgba(31,38,135,0.37)] rounded-[2.5rem] p-10 w-full max-w-lg text-center relative z-10 transition-all duration-300 hover:shadow-accent/20 hover:-translate-y-1">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <button onclick="goHome()" class="text-white/60 hover:text-white transition-colors duration-200">
                <i class="fas fa-arrow-left text-xl"></i>
            </button>
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/10 border border-white/20 backdrop-blur-md text-xs font-semibold text-accent-100 shadow-inner">
                <i class="fas fa-crown text-yellow-400"></i> Premium Plan
            </div>
            <div class="w-5"></div> <!-- For balancing the flex header -->
        </div>

        <!-- Avatar Container -->
        <div class="relative w-32 h-32 mx-auto mb-6">
            <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-accent via-blue-400 to-purple-500 animate-spin-slow" style="animation: spin 8s linear infinite;"></div>
            <div class="absolute inset-1 bg-slate-900 rounded-full flex items-center justify-center overflow-hidden border-2 border-slate-900 z-10">
                <img id="userAvatar" src="" alt="Avatar" class="w-full h-full object-cover">
            </div>
            <div class="absolute bottom-1 right-1 w-6 h-6 bg-green-500 border-4 border-slate-900 rounded-full z-20"></div>
        </div>

        <!-- User Info -->
        <h1 id="userName" class="text-3xl font-extrabold text-white mb-1 tracking-tight drop-shadow-md">Loading...</h1>
        <p id="userEmail" class="text-gray-300 font-medium mb-8 flex items-center justify-center gap-2">
            <i class="fas fa-envelope text-accent/80"></i> <span>...</span>
        </p>

        <!-- Stats Mockup -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white/5 border border-white/10 rounded-2xl p-4 transition-all duration-200 hover:bg-white/10 text-center">
                <div class="text-2xl font-bold text-accent mb-1">03</div>
                <div class="text-xs text-gray-400 font-medium uppercase tracking-wider">Trips Planned</div>
            </div>
            <div class="bg-white/5 border border-white/10 rounded-2xl p-4 transition-all duration-200 hover:bg-white/10 text-center">
                <div class="text-2xl font-bold text-purple-400 mb-1">12</div>
                <div class="text-xs text-gray-400 font-medium uppercase tracking-wider">Cities Explored</div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="space-y-4">
            <button onclick="goHome()" class="w-full bg-gradient-to-r from-accent to-blue-500 text-white font-bold py-4 px-6 rounded-2xl shadow-lg hover:shadow-accent/50 hover:scale-[1.02] transition-all duration-300 flex items-center justify-center gap-2">
                <i class="fas fa-plane-departure"></i> Back to Dashboard
            </button>

            <button onclick="logout()" class="w-full bg-white/5 border border-white/10 text-red-400 font-semibold py-4 px-6 rounded-2xl hover:bg-red-500/10 transition-all duration-300 flex items-center justify-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Secure Logout
            </button>
        </div>
    </div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    document.getElementById("userName").innerText = user.name;
    document.getElementById("userEmail").querySelector("span").innerText = user.email;
    
    // Auto generate nice avatar
    document.getElementById("userAvatar").src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=1e293b&color=06b6d4&size=256&bold=true`;
});

function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

function goHome() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
