<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Travel Planner</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Tailwind -->
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
        <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'primary': '#0f172a',
                        'secondary': '#1e293b',
                        'accent': '#06b6d4',
                        'accent-dark': '#0891b2',
                        'gradient-start': '#667eea',
                        'gradient-end': '#764ba2',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-out',
                        'slide-up': 'slideUp 0.6s ease-out',
                        'bounce-slow': 'bounce 2s infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(50px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>
    

    <!-- Your CSS -->
    <link rel="stylesheet" href="style.css">
</head>


<body class="bg-gradient-to-br from-slate-50 to-blue-100 min-h-screen flex items-center justify-center">

    <!-- Signup Card -->
    <div class="glass rounded-3xl p-10 w-full max-w-md shadow-2xl animate-fade-in">

        <!-- Logo -->
        <div class="text-center mb-8">
            <i class="fas fa-robot text-4xl text-accent mb-3"></i>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-accent to-purple-600 bg-clip-text text-transparent">
                Create Account
            </h1>
            <p class="text-gray-600 mt-2">Start your AI travel journey</p>
        </div>

        <!-- Form -->
        <form id="signupForm" class="space-y-5">

            <!-- Name -->
            <div>
                <label class="block text-sm font-medium mb-1">Full Name</label>
                <input type="text" id="name" placeholder="Enter your name"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-accent">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" id="email" placeholder="Enter your email"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-accent">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" id="password" placeholder="Create password"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-accent">
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-medium mb-1">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password"
                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-accent">
            </div>

            <!-- Terms -->
            <div class="flex items-start gap-2 text-sm">
                <input type="checkbox" id="terms" class="mt-1">
                <label for="terms" class="text-gray-600">
                    I agree to the <a href="#" class="text-accent font-medium">Terms & Conditions</a>
                </label>
            </div>

            <!-- Button -->
            <button type="submit"
                class="w-full py-3 bg-gradient-to-r from-accent to-blue-500 text-white rounded-xl font-semibold hover:shadow-lg transition-all">
                Create Account
            </button>
        </form>

        <!-- Divider -->
        <div class="text-center my-6 text-gray-500">or</div>

        <!-- Google Signup -->
        <button
            class="w-full py-3 border border-gray-300 rounded-xl flex items-center justify-center gap-3 hover:bg-gray-50">
            <i class="fab fa-google text-red-500"></i>
            Sign up with Google
        </button>

        <!-- Login Redirect -->
        <p class="text-center mt-6 text-sm text-gray-600">
            Already have an account?
            <a href="login.html" class="text-accent font-semibold">Login</a>
        </p>
    </div>
    <!-- Toast Notification -->
    <div id="toast" class="fixed top-5 right-5 px-6 py-3 rounded-xl shadow-lg transform transition-all duration-300 translate-x-full opacity-0 z-50 text-white font-medium"></div>

    <script>
function showToast(message, isError = false, callback = null) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.className = `fixed top-5 right-5 px-6 py-3 rounded-xl shadow-lg transform transition-all duration-300 z-50 text-white font-medium ${isError ? 'bg-red-500' : 'bg-green-500'}`;
    
    setTimeout(() => toast.classList.remove("translate-x-full", "opacity-0"), 10);
    
    setTimeout(() => {
        toast.classList.add("translate-x-full", "opacity-0");
        if (callback) setTimeout(callback, 300);
    }, 2000);
}

document.getElementById("signupForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const terms = document.getElementById("terms").checked;

    // Basic validation
    if (!name || !email || !password || !confirmPassword) {
        return showToast("Please fill all fields", true);
    }

    if (password !== confirmPassword) {
        return showToast("Passwords do not match", true);
    }

    if (!terms) {
        return showToast("Accept terms & conditions", true);
    }

    try {
        const res = await fetch(`${CONFIG.API_BASE_URL}/api/auth/signup`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (res.ok) {
            showToast(data.message, false, () => {
                window.location.href = "login.html";
            });
        } else {
            showToast(data.detail || data.message || "Signup failed", true);
        }

    } catch (err) {
        console.error(err);
        showToast("Server error", true);
    }
});
</script>

</body>
</html>
